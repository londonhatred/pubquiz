<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Freaks &amp; Geeks — Quiz Stats</title>
<style>
  :root{
    --bg:#14161a; --panel:#191c21; --panel2:#1f232a; --line:#30353d;
    --ink:#e6e8ea; --ink-dim:#9a9fa7; --ink-faint:#6b717a;
    --chalk:#f0f1f2; --gold:#c9a23f; --good:#5aa97a; --bad:#cf6a62;
    --accent:#7aa2c4; --accent2:#7aa2c4; --double:#c9a23f;
    --radius:0px; --mono:'IBM Plex Mono','SFMono-Regular',Consolas,monospace;
    --sans:'IBM Plex Sans',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
  }
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:var(--sans);line-height:1.5;
    -webkit-font-smoothing:antialiased;}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

  /* ---- header ---- */
  header.hero{
    background:var(--panel);
    border-bottom:1px solid var(--line);
    padding:28px 22px 22px;position:relative;
  }
  .hero-inner{max-width:1180px;margin:0 auto;display:flex;
    justify-content:space-between;align-items:flex-end;gap:20px;flex-wrap:wrap}
  .brand h1{font-family:var(--sans);font-weight:700;
    font-size:clamp(26px,4vw,40px);letter-spacing:-.02em;line-height:1;margin:0;
    color:var(--chalk)}
  .brand .sub{font-family:var(--mono);font-size:11px;letter-spacing:2px;
    text-transform:uppercase;color:var(--ink-dim);margin-top:9px}
  .brand .tag{color:var(--ink-faint);font-size:13px;margin-top:3px}
  .admin-box{display:flex;flex-direction:column;align-items:flex-end;gap:8px}
  .status-pill{font-family:var(--mono);font-size:11px;letter-spacing:.5px;
    padding:5px 10px;border-radius:0;
    border:1px solid var(--line);color:var(--ink-dim);white-space:nowrap}
  .status-pill.live{border-color:var(--good);color:var(--good)}
  .status-pill.warn{border-color:var(--gold);color:var(--gold)}
  .btn{font-family:var(--sans);font-size:13px;letter-spacing:0;cursor:pointer;font-weight:500;
    background:var(--panel2);color:var(--ink);border:1px solid var(--line);
    padding:8px 14px;border-radius:0;transition:.12s}
  .btn:hover{border-color:var(--ink-faint);background:#262b33}
  .btn:focus-visible{outline:2px solid var(--accent);outline-offset:1px}
  .btn.primary{background:var(--accent);border-color:var(--accent);color:#10161c;font-weight:600}
  .btn.primary:hover{filter:brightness(1.06)}
  .btn.gold{background:transparent;border-color:var(--gold);color:var(--gold);font-weight:600}
  .btn.gold:hover{background:rgba(201,162,63,.1)}
  .btn.ghost{background:transparent}
  .btn.sm{padding:5px 10px;font-size:12px}
  .btn[disabled]{opacity:.4;cursor:not-allowed}

  /* ---- tabs ---- */
  nav.tabs{position:sticky;top:0;z-index:30;background:var(--bg);
    border-bottom:1px solid var(--line)}
  .tabs-inner{max-width:1180px;margin:0 auto;display:flex;gap:0;
    padding:0 14px;overflow-x:auto}
  .tab{font-family:var(--sans);font-size:13px;letter-spacing:0;font-weight:500;
    color:var(--ink-dim);background:none;border:none;cursor:pointer;
    padding:13px 15px;border-bottom:2px solid transparent;white-space:nowrap;transition:.12s}
  .tab:hover{color:var(--ink)}
  .tab.active{color:var(--chalk);border-bottom-color:var(--accent)}
  .tab:focus-visible{outline:2px solid var(--accent);outline-offset:-4px}

  main{max-width:1180px;margin:0 auto;padding:26px 18px 80px}
  .view{display:none}
  .view.active{display:block}

  .eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:1.5px;
    text-transform:uppercase;color:var(--ink-faint);margin:0 0 14px}
  h2.section{font-family:var(--sans);font-weight:700;letter-spacing:-.01em;
    font-size:23px;margin:32px 0 4px;color:var(--chalk)}
  h2.section:first-child{margin-top:0}
  .section-note{color:var(--ink-dim);font-size:13px;margin:0 0 16px}

  /* ---- stat grid ---- */
  .stat-grid{display:grid;gap:1px;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
    background:var(--line);border:1px solid var(--line)}
  .stat{background:var(--panel);border:none;border-radius:0;
    padding:16px;position:relative;overflow:hidden}
  .stat .label{font-family:var(--mono);font-size:10.5px;letter-spacing:1px;
    text-transform:uppercase;color:var(--ink-faint)}
  .stat .val{font-family:var(--sans);font-weight:600;font-size:32px;line-height:1.05;
    margin-top:8px;color:var(--chalk);font-variant-numeric:tabular-nums}
  .stat .val small{font-size:15px;color:var(--ink-dim);margin-left:3px;font-weight:400}
  .stat .foot{font-size:11.5px;color:var(--ink-faint);margin-top:5px}
  .stat.accent .val{color:var(--accent)}

  /* ---- panels & tables ---- */
  .panel{background:var(--panel);border:1px solid var(--line);
    border-radius:0;overflow:hidden;margin-bottom:16px}
  .panel-head{padding:13px 16px;border-bottom:1px solid var(--line);
    display:flex;justify-content:space-between;align-items:center;gap:10px}
  .panel-head h3{margin:0;font-family:var(--sans);font-size:13px;letter-spacing:0;font-weight:600;
    text-transform:none;color:var(--ink)}
  .panel-body{padding:4px 0}
  table{width:100%;border-collapse:collapse;font-size:13.5px}
  th{font-family:var(--mono);font-size:10.5px;letter-spacing:1px;text-transform:uppercase;
    color:var(--ink-faint);text-align:right;padding:10px 14px;font-weight:600;
    border-bottom:1px solid var(--line);white-space:nowrap;cursor:pointer;user-select:none}
  th:first-child{text-align:left}
  th .arrow{opacity:.5;font-size:9px;margin-left:3px}
  td{padding:10px 14px;text-align:right;border-bottom:1px solid rgba(42,51,66,.5);
    font-variant-numeric:tabular-nums}
  td:first-child{text-align:left;color:var(--chalk);font-weight:500}
  tr:last-child td{border-bottom:none}
  tbody tr:hover{background:rgba(255,255,255,.018)}
  .bar-cell{position:relative;min-width:120px}
  .bar{height:6px;border-radius:3px;background:var(--accent2);display:inline-block;vertical-align:middle}
  .pct{font-family:var(--mono);font-size:12px;color:var(--ink-dim);margin-left:8px}
  .chip{display:inline-block;font-family:var(--mono);font-size:10.5px;letter-spacing:.5px;
    padding:2px 7px;border-radius:5px;background:var(--panel2);border:1px solid var(--line);
    color:var(--ink-dim);margin:1px 2px}
  .chip.win{color:var(--good);border-color:rgba(95,200,143,.35)}
  .chip.pod{color:var(--gold);border-color:rgba(232,176,75,.35)}
  .chip.double{color:var(--double);border-color:rgba(202,168,74,.5);background:rgba(202,168,74,.08)}
  .chip.chip-pri{color:var(--accent);border-color:var(--accent);font-weight:600}
  .chip.chip-sec{color:var(--ink);border-color:var(--ink-faint)}
  /* teach-the-engine ranked tag picker */
  .tk-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
  .tk-chip{font-family:var(--sans);font-size:13px;cursor:pointer;background:var(--panel2);
    border:1px solid var(--line);color:var(--ink-dim);padding:6px 10px;border-radius:0}
  .tk-chip:hover{border-color:var(--ink-faint);color:var(--ink)}
  .tk-chip.on{background:var(--accent);border-color:var(--accent);color:#10161c;font-weight:600}
  .tk-rank{font-family:var(--mono);font-size:10px;opacity:.85}
  .mini-add{background:none;border:none;color:var(--accent);cursor:pointer;font-family:var(--mono);font-size:11.5px;padding:0;text-decoration:underline}
  /* keyword admin list */
  .kw-list{display:flex;flex-direction:column;gap:1px;background:var(--line);border:1px solid var(--line);margin-bottom:4px}
  .kw-row{display:grid;grid-template-columns:minmax(90px,1fr) 2fr auto;gap:10px;align-items:center;background:var(--panel);padding:8px 12px}
  .kw-word{font-weight:600;color:var(--chalk);font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .kw-tags{display:flex;flex-wrap:wrap;gap:3px}
  .kw-del{color:var(--bad)}
  .form-guide{font-family:var(--mono);font-size:13px;letter-spacing:2px;font-weight:800}
  .fg-W{color:var(--gold)} .fg-P{color:var(--good)} .fg-L{color:var(--ink-faint)}

  /* ---- double engine ---- */
  .de-intro{display:grid;grid-template-columns:1fr;gap:14px}
  .de-input-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  .de-input-row input{flex:1;min-width:200px;background:var(--panel2);border:1px solid var(--line);
    color:var(--ink);padding:11px 13px;border-radius:8px;font-size:14px;font-family:inherit}
  .de-input-row input:focus{outline:2px solid var(--accent2);outline-offset:1px;border-color:transparent}
  .round-card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
    padding:14px 16px;margin-bottom:10px;position:relative;transition:.2s}
  .round-card.pick{border-color:var(--double);box-shadow:0 0 0 1px var(--double),0 6px 20px rgba(202,168,74,.12)}
  .round-card .rc-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
  .round-card .rc-title{font-weight:600;color:var(--chalk);font-size:15px}
  .round-card .rc-score{font-family:'Bebas Neue',sans-serif;font-size:34px;line-height:.9;color:var(--ink-dim)}
  .round-card.pick .rc-score{color:var(--double)}
  .round-card .rc-tags{margin-top:8px}
  .round-card .rc-meter{height:8px;background:var(--panel2);border-radius:4px;margin-top:11px;overflow:hidden}
  .round-card .rc-meter span{display:block;height:100%;background:linear-gradient(90deg,#56b6e8,#caa84a)}
  .pick-flag{position:absolute;top:-9px;right:14px;font-family:var(--mono);font-size:10px;
    letter-spacing:1.5px;text-transform:uppercase;background:var(--double);color:#23190a;
    padding:3px 9px;border-radius:5px;font-weight:700}

  /* ---- forms / modal ---- */
  .modal-bg{position:fixed;inset:0;background:rgba(8,10,14,.78);backdrop-filter:blur(3px);
    display:none;align-items:flex-start;justify-content:center;z-index:100;padding:40px 16px;overflow-y:auto}
  .modal-bg.show{display:flex}
  .modal{background:var(--panel);border:1px solid var(--line);border-radius:14px;
    width:100%;max-width:560px;animation:pop .2s ease}
  @keyframes pop{from{opacity:0;transform:scale(.97)}to{opacity:1;transform:none}}
  .modal-head{padding:18px 20px;border-bottom:1px solid var(--line);
    display:flex;justify-content:space-between;align-items:center}
  .modal-head h3{margin:0;font-family:'Bebas Neue';letter-spacing:1px;font-size:24px;color:var(--chalk)}
  .modal-body{padding:18px 20px;max-height:62vh;overflow-y:auto}
  .modal-foot{padding:14px 20px;border-top:1px solid var(--line);display:flex;gap:8px;justify-content:flex-end}
  .x{background:none;border:none;color:var(--ink-faint);font-size:24px;cursor:pointer;line-height:1}
  .field{margin-bottom:14px}
  .field label{display:block;font-family:var(--mono);font-size:11px;letter-spacing:1px;
    text-transform:uppercase;color:var(--ink-dim);margin-bottom:6px}
  .field input,.field select,.field textarea{width:100%;background:var(--panel2);
    border:1px solid var(--line);color:var(--ink);padding:9px 11px;border-radius:7px;
    font-size:14px;font-family:inherit}
  .field input:focus,.field select:focus,.field textarea:focus{outline:2px solid var(--accent2);outline-offset:1px;border-color:transparent}
  .field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .att-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:6px}
  .att-grid label{display:flex;align-items:center;gap:6px;font-size:13px;text-transform:none;
    letter-spacing:0;color:var(--ink);cursor:pointer;background:var(--panel2);
    border:1px solid var(--line);padding:7px 9px;border-radius:6px}
  .att-grid label:has(input:checked){border-color:var(--good);color:var(--good)}
  .att-grid input{width:auto}
  .hint{font-size:12px;color:var(--ink-faint);margin-top:5px}
  .round-row{display:grid;grid-template-columns:30px 1.4fr 1fr 60px 60px 40px;gap:6px;
    align-items:center;margin-bottom:6px}
  .round-row input,.round-row select{padding:6px 7px;font-size:12.5px}
  .round-row .rn{font-family:var(--mono);color:var(--ink-faint);font-size:12px;text-align:center}
  .empty{text-align:center;color:var(--ink-faint);padding:40px 20px;font-size:14px}
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);
    background:var(--panel2);border:1px solid var(--line);color:var(--ink);
    padding:11px 18px;border-radius:9px;font-size:13.5px;opacity:0;pointer-events:none;
    transition:.25s;z-index:200;box-shadow:0 8px 30px rgba(0,0,0,.4)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .two-col{display:grid;grid-template-columns:1fr 1fr;gap:18px}
  @media(max-width:760px){.two-col{grid-template-columns:1fr}
    .round-row{grid-template-columns:24px 1fr 1fr;}
    .round-row .ds,.round-row .da,.round-row .dx{display:none}}
  .legend{font-size:12px;color:var(--ink-faint);margin-top:10px;line-height:1.7}
  .legend b{color:var(--ink-dim);font-weight:600}
  .spark{display:flex;align-items:flex-end;gap:3px;height:54px;padding:6px 0}
  .spark .b{flex:1;background:var(--accent2);border-radius:2px 2px 0 0;min-height:3px;
    position:relative;transition:.2s}
  .spark .b.win{background:var(--gold)}
  .spark .b:hover{filter:brightness(1.3)}
  .mini-note{font-family:var(--mono);font-size:10px;color:var(--ink-faint);letter-spacing:1px}
  .inline-actions{display:flex;gap:6px;flex-wrap:wrap}

  /* ---- new week step tracker ---- */
  .step-track{display:flex;list-style:none;margin:18px 0 20px;padding:0;gap:0;
    counter-reset:step}
  .step-track .step{flex:1;display:flex;align-items:center;gap:9px;position:relative;
    padding:0 8px;min-width:0}
  .step-track .step::after{content:"";position:absolute;left:calc(50% + 16px);right:calc(-50% + 16px);
    top:15px;height:1px;background:var(--line)}
  .step-track .step:last-child::after{display:none}
  .step-dot{flex:none;width:30px;height:30px;border-radius:999px;display:grid;place-items:center;
    font-family:var(--mono);font-size:13px;font-weight:600;
    background:var(--panel2);border:1px solid var(--line);color:var(--ink-faint);
    position:relative;z-index:1;transition:.15s}
  .step-k{font-family:var(--mono);font-size:11.5px;letter-spacing:1.5px;text-transform:uppercase;
    color:var(--ink-faint);white-space:nowrap}
  .step.now .step-dot{background:var(--accent);border-color:var(--accent);color:#1a0d10}
  .step.now .step-k{color:var(--chalk)}
  .step.done .step-dot{background:transparent;border-color:var(--good);color:var(--good)}
  .step.done .step-k{color:var(--ink-dim)}
  .step.done::after{background:rgba(95,200,143,.4)}
  @media (max-width:560px){
    .step-k{display:none}
    .step-track .step{flex:none;justify-content:center}
    .step-track .step::after{left:calc(50% + 15px);right:auto;width:calc(100% - 30px)}
  }

  /* ---- engine / marking / rundown panes ---- */
  .eng-list{display:flex;flex-direction:column;gap:8px;margin-top:6px}
  .eng-row{display:flex;align-items:center;gap:10px;padding:10px;border:1px solid var(--line);
    border-radius:9px;background:var(--panel2)}
  .eng-row.picked{border-color:var(--double);background:rgba(202,168,74,.08)}
  .eng-rank{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--ink-faint);min-width:34px;text-align:center}
  .eng-row.picked .eng-rank{color:var(--double)}
  .eng-main{flex:1;min-width:0}
  .eng-title{width:100%;background:var(--panel);border:1px solid var(--line);color:var(--ink);
    padding:8px 10px;border-radius:7px;font-size:14px;font-family:inherit}
  .eng-tags{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:6px}
  .eng-proj{font-family:var(--mono);font-size:11px;color:var(--ink-dim)}
  .eng-best{font-family:var(--mono);font-size:10.5px;letter-spacing:1px;color:var(--gold);
    border:1px solid rgba(232,176,75,.4);border-radius:5px;padding:2px 7px}
  .eng-pick{white-space:nowrap}
  .warn-text{color:var(--gold)}
  .eng-why{margin-top:14px;border:1px solid var(--accent);background:rgba(122,162,196,.07);padding:12px 14px}
  .eng-why-h{font-family:var(--mono);font-size:10.5px;letter-spacing:1px;text-transform:uppercase;color:var(--accent);margin-bottom:5px}
  .eng-why p{margin:0;font-size:13.5px;color:var(--ink);line-height:1.5}

  .mark-row{padding:12px 16px;border-bottom:1px solid rgba(42,51,66,.5)}
  .mark-row:last-child{border-bottom:none}
  .mk-head{display:flex;align-items:center;gap:10px}
  .mk-head .rn{font-family:var(--mono);font-size:12px;color:var(--ink-faint);min-width:34px}
  .mk-title{flex:1;font-weight:500;color:var(--chalk);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .mk-score{font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--chalk);letter-spacing:.5px}
  .mk-score small{font-size:13px;color:var(--ink-faint);font-family:var(--mono)}
  .mk-line{display:flex;align-items:center;gap:10px;margin-top:8px}
  .mk-line input{width:96px;background:var(--panel2);border:1px solid var(--line);color:var(--ink);
    padding:8px 10px;border-radius:7px;font-size:14px;text-align:center;font-family:inherit}
  .mk-sound{margin-top:10px;display:flex;flex-direction:column;gap:10px}
  .mk-modes{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .mk-split{display:flex;gap:14px;flex-wrap:wrap}
  .mk-split label{display:flex;flex-direction:column;gap:4px;font-family:var(--mono);font-size:10.5px;
    letter-spacing:1px;text-transform:uppercase;color:var(--ink-faint)}
  .mk-split input{width:110px;background:var(--panel2);border:1px solid var(--line);color:var(--ink);
    padding:8px 10px;border-radius:7px;font-size:15px;text-align:center;font-family:inherit}
  .mk-theme{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--ink-dim)}
  .mk-theme input[type=checkbox]{width:auto}
  /* tap-to-credit */
  .mk-credit{margin-top:10px;padding-top:10px;border-top:1px dashed var(--line)}
  .mk-credit-head{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:6px}
  .mk-credit-label{font-family:var(--mono);font-size:10.5px;letter-spacing:1px;text-transform:uppercase;color:var(--ink-faint)}
  .mk-detail-toggle{background:none;border:none;color:var(--accent);font-size:11.5px;cursor:pointer;font-family:var(--mono);padding:0}
  .mk-chips{display:flex;flex-wrap:wrap;gap:6px}
  .credit-chip{font-family:var(--sans);font-size:12.5px;cursor:pointer;background:var(--panel2);
    border:1px solid var(--line);color:var(--ink-dim);padding:5px 10px;border-radius:0}
  .credit-chip:hover{border-color:var(--ink-faint);color:var(--ink)}
  .credit-chip.on{background:var(--accent);border-color:var(--accent);color:#10161c;font-weight:600}
  .credit-chip .cc-n{font-family:var(--mono);font-size:10px;opacity:.85;margin-left:2px}
  .mk-credit-exact{margin-top:8px;display:flex;flex-direction:column;gap:5px}
  .cx-row{display:grid;grid-template-columns:1fr 70px 70px;gap:6px;align-items:center;font-size:13px}
  .cx-row span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .cx-row input{background:var(--panel2);border:1px solid var(--line);color:var(--ink);padding:5px 7px;font-size:12px;font-family:inherit;text-align:center}
  .mark-total{display:flex;justify-content:space-between;align-items:center;gap:14px;flex-wrap:wrap;
    background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin-bottom:18px}
  .mt-label{font-family:var(--mono);font-size:10.5px;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink-faint);display:block}
  .mt-val{font-family:'Bebas Neue',sans-serif;font-size:42px;color:var(--gold);line-height:1}
  .mt-note{font-family:var(--mono);font-size:11px;color:var(--ink-faint);margin-left:10px}

  .run-summary{margin-bottom:16px}
  .run-big{background:var(--panel2);border:1px solid var(--line);border-radius:var(--radius);padding:16px;text-align:center}
  .rb-label{font-family:var(--mono);font-size:10.5px;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink-faint);display:block}
  .rb-val{font-family:'Bebas Neue',sans-serif;font-size:56px;color:var(--chalk);line-height:1;display:block;margin:4px 0}
  .rb-note{font-family:var(--mono);font-size:11px;color:var(--gold)}
  .rd-jackpot{display:flex;align-items:center;gap:9px;font-size:14px;color:var(--ink);
    background:var(--panel2);border:1px solid var(--line);border-radius:9px;padding:12px 14px;margin-top:6px;cursor:pointer}
  .rd-jackpot input{width:auto}

  /* ---- rivals / grudges ---- */
  .grudge{font-family:var(--mono);font-size:12px;padding:1px 7px;border-radius:5px;border:1px solid var(--line)}
  .grudge.win{color:var(--good);border-color:rgba(95,200,143,.35)}
  .grudge.lose{color:var(--bad);border-color:rgba(232,115,107,.35)}
  .grudge.even{color:var(--ink-dim)}
  .rival-entry{display:flex;flex-direction:column;gap:6px;margin-top:4px}
  .rival-line{display:grid;grid-template-columns:1fr 80px 80px;gap:8px;align-items:center}
  .rival-line span{font-size:13px;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .rival-line input{background:var(--panel2);border:1px solid var(--line);color:var(--ink);padding:7px 8px;border-radius:7px;font-size:13px;text-align:center;font-family:inherit}

  /* ---- bingo ---- */
  .bingo-card-wrap{display:flex;justify-content:center;margin-top:14px}
  .bingo-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;width:100%;max-width:430px}
  .bingo-cell{aspect-ratio:1;display:flex;align-items:center;justify-content:center;text-align:center;
    background:var(--panel2);border:1px solid var(--line);color:var(--ink-dim);border-radius:7px;
    padding:3px;cursor:pointer;font-family:inherit;transition:.12s;overflow:hidden;
    container-type:inline-size}
  .bingo-cell span{display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden;
    font-size:clamp(7px,2.4vw,11px);line-height:1.12}
  .bingo-cell:hover{border-color:var(--ink-faint)}
  .bingo-cell.marked{background:rgba(95,200,143,.18);border-color:var(--good);color:var(--good);font-weight:600}
  .bingo-cell.free{background:rgba(232,176,75,.12);border-color:rgba(232,176,75,.4);color:var(--gold);cursor:default}
  .bingo-cell.free span{font-family:var(--mono);letter-spacing:1px}
  @media (max-width:430px){ .bingo-grid{gap:4px} .bingo-cell{border-radius:6px} }

  /* who's-playing board */
  .bingo-board{display:flex;flex-direction:column;gap:7px}
  .bb-row{display:grid;grid-template-columns:minmax(64px,1fr) auto auto;gap:10px;align-items:center}
  .bb-name{font-size:13px;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .bb-row.me .bb-name{color:var(--chalk);font-weight:600}
  .bb-prog{display:flex;gap:3px}
  .bb-pip{width:11px;height:11px;background:var(--panel2);border:1px solid var(--line)}
  .bb-pip.lit{background:var(--ink-faint);border-color:var(--ink-faint)}
  .bb-row.close .bb-pip.lit{background:var(--gold);border-color:var(--gold)}
  .bb-row.won .bb-pip.lit{background:var(--good);border-color:var(--good)}
  .bb-count{font-family:var(--mono);font-size:10.5px;color:var(--ink-dim);white-space:nowrap;text-align:right}
  .bb-row.close .bb-count{color:var(--gold)}
  .bb-row.won .bb-count{color:var(--good)}

  /* ---- new week round editor ---- */
  .round-edit{padding:12px 16px;border-bottom:1px solid rgba(42,51,66,.5)}
  .round-edit:last-child{border-bottom:none}
  .re-head{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
  .re-head .rn{font-family:var(--mono);font-size:12px;color:var(--ink-faint);min-width:26px}
  .re-title{flex:1;min-width:160px;background:var(--panel2);border:1px solid var(--line);color:var(--ink);padding:8px 10px;border-radius:7px;font-size:14px;font-family:inherit}
  .re-type{background:var(--panel2);border:1px solid var(--line);color:var(--ink);padding:8px;border-radius:7px;font-size:12.5px;font-family:inherit}
  .re-num{width:56px;background:var(--panel2);border:1px solid var(--line);color:var(--ink);padding:8px 6px;border-radius:7px;font-size:13px;text-align:center;font-family:inherit}
  .re-dbl{display:flex;align-items:center;gap:3px;font-family:var(--mono);font-size:11px;color:var(--ink-dim);cursor:pointer}
  .re-dbl input{width:auto}
  .re-nodbl{cursor:default;color:var(--ink-faint);min-width:24px;justify-content:center}
  .re-themept{display:inline-flex;align-items:center;gap:6px;margin:6px 0 2px;
    font-family:var(--mono);font-size:11px;letter-spacing:.3px;color:var(--gold);cursor:pointer}
  .re-themept input{width:auto}
  .re-title:focus,.re-type:focus,.re-num:focus{outline:2px solid var(--accent2);outline-offset:1px;border-color:transparent}
  .re-tags{margin-top:8px;display:flex;gap:4px;align-items:center;flex-wrap:wrap}
  .re-proj{font-family:var(--mono);font-size:11px;color:var(--double);margin-left:auto}
  .chip.warn{color:var(--gold);border-color:rgba(232,176,75,.5);background:rgba(232,176,75,.08);cursor:pointer}
  .re-attr-toggle{background:none;border:none;color:var(--accent2);font-size:12px;cursor:pointer;margin-top:8px;padding:0;font-family:var(--mono)}
  .re-attr{margin-top:8px;padding:10px;background:var(--panel2);border-radius:8px}
  .attr-grid{display:flex;flex-direction:column;gap:5px}
  .attr-row{display:grid;grid-template-columns:1fr 70px 70px;gap:6px;align-items:center;font-size:13px}
  .attr-row input{background:var(--panel);border:1px solid var(--line);color:var(--ink);padding:5px 7px;border-radius:6px;font-size:12px;font-family:inherit}
  .setup-list{margin:8px 0 12px;padding-left:20px;font-size:13.5px;color:var(--ink-dim);line-height:1.7}
  .setup-list li{margin-bottom:6px}
  .setup-list b{color:var(--ink)}
  code{font-family:var(--mono);font-size:12px;background:var(--panel2);padding:1px 5px;border-radius:4px;color:var(--gold)}
  textarea{width:100%;background:var(--panel2);border:1px solid var(--line);color:var(--ink);border-radius:7px;padding:9px 11px;resize:vertical}
  /* ===== flat, neutral overrides (square corners, no decoration) ===== */
  .btn, input, select, textarea, .chip, .grudge, .stat, .panel, .modal,
  .round-card, .rc-meter, .re-title, .re-type, .re-num, .re-attr, .attr-row input,
  .rd-jackpot, .run-big, .mark-total, .rival-line input, .bingo-cell, .bb-pip,
  .status-pill, .bar, .spark .b, .eng-row, .mk-split input, code, .rc-tags .chip{
    border-radius:0 !important;
  }
  .step-dot{border-radius:0 !important}
  /* neutral display face for the big numbers/headings that used Bebas */
  .round-card .rc-score, .eng-rank, .mk-score, .mt-val, .rb-val, .modal-head h3{
    font-family:var(--sans) !important; font-weight:600 !important; letter-spacing:-.01em !important;
    font-variant-numeric:tabular-nums;
  }
  .mt-val{color:var(--accent) !important}
  .rb-val{font-weight:700 !important}
  /* strip glows, gradients, blur */
  .round-card.pick{box-shadow:none !important; outline:1px solid var(--double); outline-offset:-1px}
  .round-card .rc-meter span{background:var(--accent) !important}
  .modal-bg{backdrop-filter:none !important; background:rgba(8,10,14,.7) !important}
  .modal{box-shadow:none !important}
  .toast{box-shadow:none !important; border:1px solid var(--line)}
  .spark .b{border-radius:0 !important; background:var(--ink-faint)}
  .spark .b.win{background:var(--accent)}
  .bar{background:var(--ink-faint) !important}
  /* tighter, flatter chips */
  .chip{background:var(--panel2);border:1px solid var(--line);color:var(--ink-dim)}
  .chip.win{color:var(--good);border-color:var(--good);background:transparent}
  .chip.pod{color:var(--gold);border-color:var(--gold);background:transparent}
  .chip.double{color:var(--double);border-color:var(--double);background:transparent}
  .chip.warn{color:var(--bad);border-color:var(--bad);background:transparent}
  code{color:var(--accent) !important}
  /* danger zone */
  .panel.danger{border-color:var(--bad)}
  .panel.danger .panel-head h3{color:var(--bad)}
  .danger-btn{border-color:var(--bad);color:var(--bad)}
  .danger-btn:hover{background:rgba(207,106,98,.1);border-color:var(--bad)}
</style>
</head>

/* ---------- STATE ---------- */
/* starter host-trope squares (admin-editable under Bingo) — defined before

const DEFAULT_TROPES = [
  "Host mispronounces a name","Tech fails on the sound round","Someone argues an answer",
  "\"Fingers on buzzers\" (no buzzers)","Host repeats the question twice","A team name is a pun",
  "Wrong scores read out","Host plugs the next quiz","\"Silence please!\"","A dog in the pub",

];

let sortState = {};

function load(){
  try{ const s=localStorage.getItem(STORE_KEY); if(s) return migrate(JSON.parse(s)); }catch(e){}
  return withDefaults(JSON.parse(JSON.stringify(SEED)));
}
function withDefaults(s){
  // additive defaults for newer features (safe on fresh seed or existing data)
  if(s.teamName==null) s.teamName = "Freaks & Geeks";
  if(!Array.isArray(s.rivals)) s.rivals = [];
  if(!s.bingo) s.bingo = { tropes: DEFAULT_TROPES.slice(), round: 1 };
  if(!Array.isArray(s.bingo.tropes)) s.bingo.tropes = DEFAULT_TROPES.slice();
  if(!s.bingo.round) s.bingo.round = 1;
  if(!s.bingo.players || typeof s.bingo.players!=="object") s.bingo.players = {};
  // backfill: weeks (esp. 2025 seed) with a jackpot but no jackpotWon flag read
  // as "rolled over" rather than blank. Editable per-week in the Weekly Log.
  Object.values(s.seasons||{}).forEach(se=>{
    (se.weeks||[]).forEach(w=>{ if(w.jackpot!=null && w.jackpotWon===undefined) w.jackpotWon=false; });
  });
  return s;
}
function migrate(s){
  if(!s.version){ return withDefaults(JSON.parse(JSON.stringify(SEED))); }
  return withDefaults(s);
}

/* save(): always writes locally (instant, offline-safe), then pushes to cloud
   in the background if sync is configured. */
function save(){
  state.lastModified = Date.now();
  try{ localStorage.setItem(STORE_KEY, JSON.stringify(state)); }catch(e){ toast("Couldn't save locally (storage blocked)"); }
  if(SYNC_ON) pushCloud();
}

/* ---- Supabase REST sync (no SDK needed; single shared row) ---- */
function sbHeaders(){ return { "apikey":SUPABASE_ANON_KEY, "Authorization":"Bearer "+SUPABASE_ANON_KEY, "Content-Type":"application/json" }; }
function sbUrl(){ return SUPABASE_URL.replace(/\/$/,"")+"/rest/v1/quiz_state"; }

async function pullCloud(){
  if(!SYNC_ON) return;
  setSync("connecting");
  try{
    const r = await fetch(sbUrl()+"?id=eq."+encodeURIComponent(SYNC_ROW_ID)+"&select=data,updated_at", {headers:sbHeaders()});
    if(!r.ok) throw new Error("HTTP "+r.status);
    const rows = await r.json();
    if(rows.length && rows[0].data){
      const cloud = rows[0].data;
      // newer-wins: use cloud if it's newer than local
      if(!state.lastModified || (cloud.lastModified||0) >= (state.lastModified||0)){
        state = migrate(cloud);
        try{ localStorage.setItem(STORE_KEY, JSON.stringify(state)); }catch(e){}
      }
    } else {
      // first run with empty cloud: seed it from whatever we have locally
      await pushCloud(true);
    }
    setSync("synced");
    render();
  }catch(e){ setSync("offline"); }
}

let pushTimer=null, pushing=false;
function pushCloud(immediate){
  if(!SYNC_ON) return;
  clearTimeout(pushTimer);
  pushTimer = setTimeout(async ()=>{
    if(pushing) return;
    pushing=true; setSync("saving");
    try{
      const body = JSON.stringify({ id:SYNC_ROW_ID, data:state, updated_at:new Date().toISOString() });
      const r = await fetch(sbUrl()+"?on_conflict=id", {
        method:"POST",
        headers:{...sbHeaders(), "Prefer":"resolution=merge-duplicates,return=minimal"},
        body
      });
      if(!r.ok) throw new Error("HTTP "+r.status);
      setSync("synced");
    }catch(e){ setSync("offline"); }
    pushing=false;
  }, immediate?0:600);
}

function setSync(s){ syncStatus=s; const el=$("#syncPill"); if(el){ el.textContent=syncLabel(); el.className="status-pill"+(s==="synced"?" live":s==="offline"?" warn":""); } }
function syncLabel(){ return {local:"Local only",connecting:"Connecting…",synced:"Shared · synced",offline:"Offline · saved here",saving:"Saving…"}[syncStatus]||""; }

const season = ()=> state.seasons[state.activeSeason];
const playerNames = ()=> state.players.map(p=>p.name);

/* ================= PER-PLAYER SKILL MODEL =================
   skill(player, tag) is a 0..1 estimate of how reliably that player
   contributes on that tag. It blends:
     - a light prior from 2025 MVP signal
     - evidence accumulated from logged rounds (attributed questions/rounds)
   Stored implicitly: we recompute from rounds each time (cheap, ~hundreds of rows).
============================================================== */
function playerSkill(){
  // returns {player: {tag: {right, total, est}}}
  const out = {};
  const tags = state.tags;
  state.players.forEach(p=>{
    out[p.name] = {};
    tags.forEach(t=>{
      const prior = (p.priors && p.priors[t]) || 0;
      // prior contributes a pseudo-count: each MVP ~ "got 1 of 1" with weight 0.6
      out[p.name][t] = { right: prior*0.6, total: prior*0.6 + 1.0 /*neutral pseudo*/, est: 0.5 };
    });
  });
  // evidence from all rounds in all seasons (attribution)
  Object.values(state.seasons).forEach(se=>{
    se.rounds.forEach(r=>{
      const tags = (r.tags||"").split(",").map(t=>t.trim()).filter(Boolean);
      if(!r.attribution) return;
      // attribution: { player: {right:int, asked:int} }  OR  legacy mvp string
      Object.entries(r.attribution).forEach(([name,a])=>{
        if(!out[name]) return;
        tags.forEach(t=>{
          if(out[name][t]){
            out[name][t].right += (a.right||0);
            out[name][t].total += (a.asked||a.right||0);
          }
        });
      });
    });
  });
  // finalise estimates with Laplace smoothing
  Object.values(out).forEach(byTag=> Object.values(byTag).forEach(o=>{
    o.est = (o.right + 0.5) / (o.total + 1.0);
    o.est = Math.max(0, Math.min(1, o.est));
  }));
  return out;
}

/* team strength on a tag given who's present — "soft max":
   strongest present player dominates, others add shrinking insurance. */
function teamTagStrength(tag, present, skill){
  const vals = present.map(n=> (skill[n] && skill[n][tag]) ? skill[n][tag].est : 0.5)
                      .sort((a,b)=>b-a);
  if(!vals.length) return 0.5;
  let s = vals[0], weight = 0.45;
  for(let i=1;i<vals.length;i++){ s += vals[i]*weight*(1-s); weight*=0.55; }
  return Math.min(1, s);
}

/* ================= TEAM / TAG STATS (live, current season unless told) ================= */
function weeksOf(sk){ return (sk?state.seasons[sk]:season()).weeks; }
function roundsOf(sk){ return (sk?state.seasons[sk]:season()).rounds; }

function teamStats(sk){
  const W = weeksOf(sk);
  const placed = W.filter(w=>w.placement!=null);
  const scored = W.filter(w=>w.score!=null);
  const n = placed.length;
  const wins = placed.filter(w=>+w.placement===1).length;
  const podium = placed.filter(w=>+w.placement<=3).length;
  const s2w = W.map(w=>(w.score!=null&&w.winScore)?w.score/w.winScore:null).filter(x=>x!=null);
  return { weeks:n, wins, winRate:n?wins/n:null, podiumPct:n?podium/n:null,
    avgPlace:n?placed.reduce((a,w)=>a+ +w.placement,0)/n:null,
    avgScore:scored.length?scored.reduce((a,w)=>a+ +w.score,0)/scored.length:null,
    highScore:scored.length?Math.max(...scored.map(w=>+w.score)):null,
    avgS2W:s2w.length?s2w.reduce((a,x)=>a+x,0)/s2w.length:null };
}

/* combined rounds/weeks: current season + 2025 baseline, de-duped by being
   from different seasons. Used by Strengths/Insights when the year toggle is
   on "combined". 2025 is only added if it isn't already the active season. */
function combinedRounds(){
  const cur=roundsOf();
  if(state.activeSeason==='2025' || !state.seasons['2025']) return cur;
  return cur.concat(roundsOf('2025'));
}
function combinedWeeks(){
  const cur=weeksOf();
  if(state.activeSeason==='2025' || !state.seasons['2025']) return cur;
  return cur.concat(weeksOf('2025'));
}
/* are we showing combined (2025+current) or current-only? default combined */
function yearMode(){ return sortState._yearMode || "combined"; }
function activeRounds(){ return yearMode()==="combined" ? combinedRounds() : roundsOf(); }
function activeWeeks(){ return yearMode()==="combined" ? combinedWeeks() : weeksOf(); }
/* tracker data source: explicit season wins; otherwise follow the year toggle */
function srcRounds(sk){ return sk ? roundsOf(sk) : activeRounds(); }
function srcWeeks(sk){ return sk ? weeksOf(sk) : activeWeeks(); }

function strengthByTag(rs){
  rs = rs || roundsOf();
  return state.tags.map(tag=>{
    const m = rs.filter(r=>r.tags&&r.tags.includes(tag)&&r.score!=null&&r.avail);
    const got=m.reduce((a,r)=>a+ +r.score,0), av=m.reduce((a,r)=>a+ +r.avail,0);
    return {name:tag, pct:av?got/av:null, n:m.length};
  });
}
function strengthByType(rs){
  rs = rs || roundsOf();
  return state.roundTypes.map(t=>{
    const m = rs.filter(r=>r.type===t&&r.score!=null&&r.avail);
    const got=m.reduce((a,r)=>a+ +r.score,0), av=m.reduce((a,r)=>a+ +r.avail,0);
    return {name:t, pct:av?got/av:null, n:m.length};
  });
}

/* ================= DOUBLE ENGINE (presence-aware) ================= */
/* Tag rank weights: a keyword's tags are stored in priority order.
   1st tag = primary, 2nd = secondary, 3rd = tertiary, etc. */
const TAG_WEIGHTS = [1.0, 0.6, 0.3, 0.15];
function tagWeight(rank){ return TAG_WEIGHTS[rank] != null ? TAG_WEIGHTS[rank] : 0.1; }

function detectTags(title){
  if(!title||!title.trim()) return {tags:[], weighted:[], matched:[]};
  const t=title.toLowerCase(); const matched=[];
  const best = {};  // tag -> highest weight seen across all matching keywords
  for(const kw of state.keywords){
    if(kw.k==null||kw.k==="") continue;
    const k=String(kw.k).toLowerCase();
    if(t.includes(k)){
      matched.push(kw.k);
      (kw.t||[]).forEach((tag,rank)=>{
        const w = tagWeight(rank);
        if(best[tag]==null || w>best[tag]) best[tag]=w;
      });
    }
  }
  const weighted = Object.entries(best).map(([tag,weight])=>({tag,weight}))
                         .sort((a,b)=>b.weight-a.weight);
  return { tags: weighted.map(x=>x.tag), weighted, matched };
}
function scoreRound(title, present, skill){
  const det = detectTags(title);
  if(!det.weighted.length) return {tags:[], score:0, matched:0, perTag:[]};
  const perTag = det.weighted.map(({tag,weight})=>({tag, weight, strength:teamTagStrength(tag, present, skill)}));
  // weighted average of present-adjusted strengths (primary tag dominates,
  // secondary/tertiary nudge) — keeps score in 0..1
  const wsum = perTag.reduce((a,x)=>a+x.weight,0) || 1;
  const score = perTag.reduce((a,x)=>a+x.strength*x.weight,0) / wsum;
  return {tags:det.tags, score, matched:det.matched.length, perTag};
}

  { title:"Creative",          type:"Creative",          avail:3,  doublable:false },

/* Load a saved draft only if it matches the current template version.
   A genuinely in-progress draft from this version survives a reload; a stale
   draft from an older (templateless or 10-round) version is dropped so the
   fresh 11-round template loads cleanly. Returns the draft or null. */
function loadDraft(){
  try{
    const d = localStorage.getItem(STORE_KEY+"_draft");
    if(!d) return null;
    const parsed = JSON.parse(d);
    if(parsed && parsed.version === DRAFT_VERSION) return parsed;
    // stale shape: discard so freshDraft() takes over
    localStorage.removeItem(STORE_KEY+"_draft");
    return null;
  }catch(e){ return null; }
}
/* effective avail for a round, folding in the live Sound theme point */
function roundAvail(r){
  let a = +r.avail || 0;
  if(r.themePoint && r.themeLive) a += 1;
  return a;
}
function stepTracker(cur){

    {n:1, k:"Setup"},

      return `<li class="step ${state}" aria-current="${s.n===cur?"step":"false"}">

}

const DOUBLE_ROWS = [1,2,3,6,7,8,9]; // 0-based indices of doublable rounds (R2,3,4,7,8,9,10)

/* Plain-English reasoning for why the engine recommends this round. Looks at
   the best round's tags, which present players drive them, whether it's a solo
   strength or a combo, and the margin over the next-best option. */
function doubleReasoning(best, ranked, present, skill){
  if(!best || !best.weighted || !best.weighted.length || !present.length) return null;
  const bits=[];
  // primary tag + who carries it
  const primary = best.weighted[0];
  const contributors = present.map(n=>({n, e:(skill[n]&&skill[n][primary.tag])?skill[n][primary.tag].est:0.5}))
                              .filter(x=>x.e>0.55).sort((a,b)=>b.e-a.e);
  if(contributors.length){
    if(contributors.length===1){
      bits.push(`<b>${esc(contributors[0].n)}</b> is your strongest on <b>${esc(primary.tag)}</b> (${Math.round(contributors[0].e*100)}%) and they're in tonight`);
    } else {
      const top=contributors.slice(0,2).map(c=>esc(c.n)).join(" + ");
      bits.push(`<b>${top}</b> give you real strength on <b>${esc(primary.tag)}</b> tonight`);
    }
  } else {
    bits.push(`It's your best-projected round of the doublable set, even without a standout specialist present`);
  }
  // secondary tag nudge
  if(best.weighted[1]){
    const sec=best.weighted[1];
    const secBest=present.map(n=>({n,e:(skill[n]&&skill[n][sec.tag])?skill[n][sec.tag].est:0.5})).sort((a,b)=>b.e-a.e)[0];
    if(secBest && secBest.e>0.6) bits.push(`with a ${esc(sec.tag)} angle ${esc(secBest.n)} can cover`);
  }
  // margin over next best
  const others=ranked.filter(x=>x.i!==best.i && x.proj!=null && x.tags.length);
  if(others.length){
    const next=others[0];
    const margin=Math.round((best.proj-next.proj)*100);
    if(margin>=8) bits.push(`it's clearly ahead of the next option (${esc(next.r.title||("round "+(next.i+1)))}) by ${margin} points of strength`);
    else if(margin>=3) bits.push(`it edges out ${esc(next.r.title||("round "+(next.i+1)))} by ${margin} points`);
    else bits.push(`though it's close with ${esc(next.r.title||("round "+(next.i+1)))} — either is defensible`);
  }
  // who's missing that would change it
  const absentStars = state.players.filter(p=>!draft.present[p.name])
    .map(p=>({n:p.name, e:(skill[p.name]&&skill[p.name][primary.tag])?skill[p.name][primary.tag].est:0}))
    .filter(x=>x.e>0.7).sort((a,b)=>b.e-a.e);
  let warn="";
  if(absentStars.length) warn = `<p class="hint" style="margin:6px 0 0">Note: ${esc(absentStars[0].n)} (your top ${esc(primary.tag)} player) isn't in tonight — the projection already accounts for that.</p>`;

  return `<div class="eng-why"><div class="eng-why-h">Why ${esc(best.r.title||("round "+(best.i+1)))}?</div>
    <p>${bits.join("; ")}.</p>${warn}</div>`;
}

function renderEngine(present, skill){
  // project each doublable round from its typed title
  const rows = DOUBLE_ROWS.map(i=>{
    const r = draft.rounds[i];
    const det = scoreRound(r.title||"", present, skill);
    return { i, r, tags:det.tags, weighted:det.perTag||[], proj: present.length? det.score : null, hasTitle:(r.title||"").trim().length>0 };
  });
  // rank by projection (titled+detected first, desc); untitled sink to the bottom
  const ranked = [...rows].sort((a,b)=>{
    const av=a.proj==null?-1:a.proj, bv=b.proj==null?-1:b.proj;
    return bv-av;
  });
  const best = ranked.find(x=>x.proj!=null && x.tags.length);
  const current = draft.rounds.findIndex(r=>r.double);
  const anyTitled = rows.some(x=>x.hasTitle);

  const body = `
    <div class="panel"><div class="panel-head"><h3>Engine · bank the double</h3>
      <button class="btn sm ghost" id="nw_back">← Setup</button></div>
      <div class="panel-body" style="padding:16px">
        <p class="section-note">Type each doublable round's title as it's announced. The engine ranks them by how well tonight's lineup${present.length?` (${present.map(esc).join(", ")})`:""} should do, and recommends where to put your 2×.</p>
        ${!present.length?`<p class="hint warn-text">No one's ticked in as present — projections are flat until you add the lineup in Setup.</p>`:""}
        <div class="eng-list">
          ${rows.map(x=>{
            const rankPos = ranked.findIndex(z=>z.i===x.i);
            const isBest = best && best.i===x.i;
            const isPicked = draft.rounds[x.i].double;
            return `<div class="eng-row${isPicked?" picked":""}" data-ei="${x.i}">
              <div class="eng-rank">${x.proj!=null&&x.tags.length?`#${rankPos+1}`:"—"}</div>
              <div class="eng-main">
                <input class="eng-title" data-erf="${x.i}" placeholder="Round ${x.i+1} title…" value="${esc(x.r.title||"")}">
                <div class="eng-tags">
                  ${(x.weighted&&x.weighted.length?x.weighted:x.tags.map(t=>({tag:t,weight:1}))).map(w=>`<span class="chip${w.weight>=1?" chip-pri":w.weight>=0.6?" chip-sec":""}" title="${w.weight>=1?"primary":w.weight>=0.6?"secondary":"tertiary"} tag">${esc(w.tag||w)}</span>`).join("")}
                  ${x.hasTitle&&!x.tags.length?`<span class="chip warn" data-teach="${x.i}">⚠ teach the engine</span>`:""}
                  ${x.proj!=null&&x.tags.length?`<span class="eng-proj">strength ${Math.round(x.proj*100)}%</span>`:""}
                  ${isBest?`<span class="eng-best">★ best bank</span>`:""}
                </div>
              </div>
              <button class="btn sm ${isPicked?"gold":"ghost"} eng-pick" data-pick="${x.i}">${isPicked?"2× here":"set 2×"}</button>
            </div>`;
          }).join("")}
        </div>
        ${best&&present.length?doubleReasoning(best, ranked, present, skill)||"":""}
        <p class="hint">${current>=0?`Double banked on round ${current+1}${draft.rounds[current].title?` — ${esc(draft.rounds[current].title)}`:""}.`:`No double set yet.${best?` Suggested: round ${best.i+1}.`:""}`}</p>
        <div class="inline-actions" style="margin-top:14px">
          <button class="btn primary" id="nw_next">Night details →</button>
          <button class="btn ghost" id="nw_discard">Discard</button>
        </div>
      </div>
    </div>`;
  nwShell(2, "", body);

  // wiring
  $("#nw_back").onclick=()=>nwGoStep(1);
  $("#nw_discard").onclick=nwDiscard;
  $("#nw_next").onclick=()=>nwGoStep(3);
  $$(".eng-title").forEach(el=>{
    const i=+el.dataset.erf;
    const setv=()=>{ draft.rounds[i].title=el.value; saveLocalDraft(); };
    el.oninput=setv;
    el.onblur=()=>{ setv(); renderNewWeek(); };
    el.onkeydown=e=>{ if(e.key==="Enter"){ setv(); renderNewWeek(); } };
  });
  $$("[data-pick]").forEach(b=> b.onclick=()=>{
    const i=+b.dataset.pick;
    const wasPicked = draft.rounds[i].double;
    draft.rounds.forEach(r=>{ if(r.doublable!==false) r.double=false; });
    draft.rounds[i].double = !wasPicked;   // toggle off if re-clicking the same one
    saveLocalDraft(); renderNewWeek();
  });
  $$("[data-teach]").forEach(b=> b.onclick=()=>openTeachModal(draft.rounds[+b.dataset.teach].title, ()=>renderNewWeek()));
}

/* ---- shared scoring of the draft as marked ---- */
function roundEffectiveScore(r){
  // Sound split mode: score is artist halves + title halves (+theme if live)
  if(r.sound && r.mode==="split"){
    const a=+r.artistScore||0, t=+r.titleScore||0;
    let s = a*0.5 + t*0.5;
    if(r.themePoint && r.themeLive) s += (+r.themeScore||0);
    return s;
  }
  return +r.score||0;
}
function draftTotals(){
  let base=0, withDouble=0, dblRound=-1;
  draft.rounds.forEach((r,i)=>{
    const s=roundEffectiveScore(r);
    base += s;
    withDouble += (r.doublable!==false && r.double) ? s*2 : s;
    if(r.doublable!==false && r.double) dblRound=i;
  });
  return { base, withDouble, dblRound };
}

  const isDouble = r.doublable!==false && r.double;

  const shown = isDouble ? eff*2 : eff;
  const avail = roundAvail(r) * (isDouble?2:1);

      <span class="mk-score">${fmtScore(shown)}<small>/${avail}</small></span>
    </div>`;

  if(r.sound){
    // Sound widget: mode toggle + (split: artist/title halves) or (flat: single) + theme point
    const split = r.mode!=="flat";
    return `<div class="mark-row sound" data-mi="${i}">
      ${head}

        ${r.themePoint?`<label class="mk-theme"><input type="checkbox" data-stheme="${i}" ${r.themeLive?"checked":""}> theme point live (+1)${r.themeLive?` <input type="number" min="0" max="1" step="1" data-sf="themeScore" data-i="${i}" value="${r.themeScore??""}" placeholder="0–1" style="width:64px">`:""}</label>`:""}

  }

  // standard round: single score input + base-available, double shows ×2 effect
  return `<div class="mark-row" data-mi="${i}">

/* Tap-to-credit: tap whoever carried the round (multiple allowed). One tap =
   right:1, asked:1. The "exact" expander reveals right/asked per credited
   person for rounds you want precise. Writes to draft.rounds[i].attribution,
   which playerSkill() already reads to learn each player's subject strengths. */
function creditBlock(r,i,present){
  if(!present.length) return `<div class="mk-credit"><span class="hint" style="margin:0">Tick who's present in Setup to credit answers.</span></div>`;
  const attr = r.attribution||{};
  const credited = present.filter(n=>attr[n]);
  const expanded = !!(r._creditOpen);
  return `<div class="mk-credit" data-ci="${i}">
    <div class="mk-credit-head">
      <span class="mk-credit-label">Who carried it?</span>
      ${credited.length?`<button class="mk-detail-toggle" data-credit-detail="${i}">${expanded?"hide counts":"exact counts"}</button>`:""}
    </div>
    <div class="mk-chips">
      ${present.map(n=>`<button type="button" class="credit-chip${attr[n]?" on":""}" data-credit="${i}" data-name="${esc(n)}">${esc(n)}${attr[n]&&(attr[n].right!=null)?` <span class="cc-n">${attr[n].right}/${attr[n].asked??attr[n].right}</span>`:""}</button>`).join("")}
    </div>
    ${expanded&&credited.length?`<div class="mk-credit-exact">
      ${credited.map(n=>{const a=attr[n]||{};return `<div class="cx-row"><span>${esc(n)}</span>
        <input type="number" min="0" placeholder="right" data-cx-right="${i}" data-cx-name="${esc(n)}" value="${a.right??""}">
        <input type="number" min="0" placeholder="asked" data-cx-asked="${i}" data-cx-name="${esc(n)}" value="${a.asked??""}"></div>`;}).join("")}
      <p class="hint" style="margin:4px 0 0">Right out of asked. Feeds each person's subject strengths.</p>
    </div>`:""}
  </div>`;
}

/* ================= TEACH-THE-ENGINE (add keyword) ================= */
function openTeachModal(prefill, after){
  let picked = [];  // tags in priority order
  const drawTags = ()=>{
    const chips = state.tags.map(t=>{
      const rank = picked.indexOf(t);
      const on = rank>=0;
      const label = rank===0?"1·primary":rank===1?"2·secondary":rank===2?"3·tertiary":rank>=0?(rank+1)+"·":"";
      return `<button type="button" class="tk-chip${on?" on":""}" data-tkpick="${esc(t)}">${esc(t)}${on?` <span class="tk-rank">${label}</span>`:""}</button>`;
    }).join("");
    const order = picked.length? `<p class="hint" style="margin:8px 0 0">Priority: ${picked.map((t,i)=>`<b>${esc(t)}</b>${i<picked.length-1?" › ":""}`).join("")}. The first tag drives the projection most; later tags nudge it.</p>` : `<p class="hint" style="margin:8px 0 0">Tap tags in order of importance — first tap is the primary subject.</p>`;
    $("#tk_tags").innerHTML = chips;
    $("#tk_order").innerHTML = order;
    $$("[data-tkpick]").forEach(b=> b.onclick=()=>{
      const t=b.dataset.tkpick; const i=picked.indexOf(t);
      if(i>=0) picked.splice(i,1); else picked.push(t);
      drawTags();
    });
  };
  openModal(`<div class="modal-head"><h3>Teach the engine</h3><button class="x" data-close>×</button></div>
    <div class="modal-body">
      <p class="hint">Add a keyword so round titles containing it get detected. Then tap its subject tags <b>in priority order</b> — primary first.</p>
      <div class="field"><label>Keyword / phrase</label><input id="tk_word" value="${esc(prefill||"")}" placeholder="e.g. Eurovision"></div>
      <div class="field"><label>Subject tags (tap in priority order)</label>
        <div class="tk-tags" id="tk_tags"></div>
        <div id="tk_order"></div>
      </div>
    </div>
    <div class="modal-foot"><button class="btn ghost" data-close>Cancel</button>
      <button class="btn primary" id="tk_save">Add keyword</button></div>`);
  drawTags();
  $("#tk_save").onclick=()=>{
    const word=$("#tk_word").value.trim();
    if(!word||!picked.length){ toast("Need a keyword and at least one tag"); return; }
    state.keywords.push({k:word, t:picked.slice(), s:0});
    save(); closeModal(); toast(`"${word}" added (primary: ${picked[0]})`); after&&after(); render();
  };
}

  const cards='<div class="stat-grid" style="margin-top:18px">'

  let risHtml;
  if(ris.n){
    const rows=ris.hosts.map(h=>{
      const d=h.avg-ris.mean, cls=d>=0?"win":"lose", sign=d>=0?"+":"";
      return '<tr><td style="text-align:left;color:var(--chalk)">'+esc(h.host)+'</td><td>'+h.n+'</td><td>'+num(h.avg,1)+'</td><td><span class="grudge '+cls+'">'+sign+num(d,1)+'</span></td></tr>';
    }).join("");
    risHtml='<p class="hint" style="margin-top:0">Overall average <b>'+num(ris.mean,1)+'</b>/10 across '+ris.n+' rated nights.</p>'
      +'<table><thead><tr><th>Host</th><th>Nights</th><th>Avg RIS</th><th>vs avg</th></tr></thead><tbody>'+rows+'</tbody></table>';
  } else {
    risHtml='<p class="hint" style="margin:0">No RIS ratings yet — add one in a week\u2019s Rundown.</p>';
  }

  let charmHtml;
  if(charm){
    const rows=lucky.slice(0,6).map(x=>{
      const without = x.withoutN
        ? '<span class="grudge '+(x.delta>=0?"win":"lose")+'">'+(x.delta>=0?"+":"")+pct(x.delta)+'</span>'
        : "—";
      return '<tr><td style="text-align:left;color:var(--chalk)">'+esc(x.name)+'</td><td>'+pct(x.withWR)+' <span class="pct">'+x.withN+'w</span></td><td>'+(x.withoutN?pct(x.withoutWR):"—")+'</td><td>'+without+'</td></tr>';
    }).join("");
    charmHtml='<p class="hint" style="margin-top:0">Best swing: <b>'+esc(charm.name)+'</b> — we win <b>'+pct(charm.withWR)+'</b> with them ('+charm.withN+'w) vs <b>'+pct(charm.withoutWR)+'</b> without ('+charm.withoutN+'w).</p>'
      +'<table><thead><tr><th>Player</th><th>Win % with</th><th>Win % without</th><th>Swing</th></tr></thead><tbody>'+rows+'</tbody></table>';
  } else {
    charmHtml='<p class="hint" style="margin:0">Not enough weeks yet to compare lineups.</p>';
  }

  return cards
    + '<div class="two-col" style="margin-top:18px">'
    +   '<div class="panel"><div class="panel-head"><h3>Rusty Intonation Score</h3><span class="mini-note">BY HOST</span></div>'
    +     '<div class="panel-body" style="padding:14px 16px">'+risHtml+'</div></div>'
    +   '<div class="panel"><div class="panel-head"><h3>Lucky charm</h3><span class="mini-note">RESULT BY WHO\u2019S THERE</span></div>'
    +     '<div class="panel-body" style="padding:14px 16px">'+charmHtml+'</div></div>'
    + '</div>';
}

/* ================= DASHBOARD ================= */
/* current + longest win/podium streaks from chronological weeks */
function streaks(sk){
  const W=weeksOf(sk).filter(w=>w.placement!=null).slice().sort((a,b)=>(a.date||"")<(b.date||"")?-1:1);
  let curW=0,bestW=0,curP=0,bestP=0;
  W.forEach(w=>{
    const p=+w.placement;
    curW = p===1?curW+1:0; bestW=Math.max(bestW,curW);
    curP = p<=3?curP+1:0; bestP=Math.max(bestP,curP);
  });
  return { curW, bestW, curP, bestP };
}
/* for each player: our win rate WITH them present vs WITHOUT — the lucky charm */
function luckyCharm(sk){
  const W=weeksOf(sk).filter(w=>w.placement!=null);
  return state.players.map(p=>{
    const withp=W.filter(w=>w.attendance&&+w.attendance[p.name]===1);
    const without=W.filter(w=>!(w.attendance&&+w.attendance[p.name]===1));
    const wr=arr=>arr.length?arr.filter(w=>+w.placement===1).length/arr.length:null;
    return { name:p.name, withN:withp.length, withoutN:without.length, withWR:wr(withp), withoutWR:wr(without) };
  }).filter(x=>x.withN>0);
}
/* did this player appear (attend) in the given season at all? */
function appearedIn(name, sk){ return weeksOf(sk).some(w=>w.attendance&&+w.attendance[name]===1); }

/* ---- DOUBLE ENGINE ACCURACY ----
   For each week with a double, was the doubled round actually the best % among
   that week's doublable rounds? "Hit" if it tied for or beat the best. */
function doubleAccuracy(sk){
  const byDate={};
  srcRounds(sk).forEach(r=>{ if(r.avail){ (byDate[r.date]=byDate[r.date]||[]).push(r); } });
  let weeks=0, hits=0, gainSum=0, gainN=0;
  Object.values(byDate).forEach(rs=>{
    const dbl=rs.find(r=>r.double); if(!dbl||!dbl.avail) return;
    weeks++;
    const pct=r=>r.score!=null&&r.avail?(+r.score/+r.avail):null;
    const dblPct=pct(dbl);
    const others=rs.filter(r=>r!==dbl).map(pct).filter(x=>x!=null);
    if(dblPct==null||!others.length) return;
    const bestOther=Math.max(...others);
    if(dblPct>=bestOther) hits++;
    // points gained vs if we'd doubled the average round instead
    const avgOther=others.reduce((a,x)=>a+x,0)/others.length;
    gainSum += (dblPct-avgOther)*(+dbl.avail); gainN++;
  });
  return { weeks, hits, hitRate:weeks?hits/weeks:null, avgGain:gainN?gainSum/gainN:null };
}

/* ---- SCORE vs WINNING SCORE: gap to the best team over time ---- */
function gapTrend(sk){
  return srcWeeks(sk).filter(w=>w.score!=null&&w.winScore)
    .map(w=>({date:w.date, gap:+w.winScore-+w.score, s2w:+w.score/+w.winScore, won:+w.placement===1}));
}

/* ---- JACKPOT: total rolled over + current unwon streak + on the table ---- */
function jackpotStats(sk){
  // Rollover is a within-season continuity stat: a streak shouldn't span the
  // gap between seasons (e.g. last 2025 week -> first 2026 week). So we always
  // use the *active* season's weeks here, regardless of the year toggle.
  const W=weeksOf(sk).filter(w=>w.jackpot!=null).slice().sort((a,b)=>(a.date||"")<(b.date||"")?-1:1);
  let rolledWeeks=0, curStreak=0, lastJackpot=null;
  W.forEach(w=>{ lastJackpot=w.jackpot; if(w.jackpotWon){ curStreak=0; } else { rolledWeeks++; curStreak++; } });
  return { rolledWeeks, curStreak, onTable:lastJackpot, n:W.length, season:(sk||state.activeSeason) };
}

/* ---- ROUND-TYPE CONSISTENCY: mean % and variability per type ---- */
function typeConsistency(sk){
  return state.roundTypes.map(t=>{
    const rs=srcRounds(sk).filter(r=>r.type===t&&r.score!=null&&r.avail);
    const ps=rs.map(r=>+r.score/+r.avail);
    if(ps.length<2) return {name:t, n:ps.length, mean:ps.length?ps[0]:null, sd:null};
    const mean=ps.reduce((a,x)=>a+x,0)/ps.length;
    const sd=Math.sqrt(ps.reduce((a,x)=>a+(x-mean)**2,0)/ps.length);
    return {name:t, n:ps.length, mean, sd};
  }).filter(x=>x.n>0);
}

/* ---- SOUND THEME-POINT CONVERSION ---- */
function themePointRate(sk){
  // Sound rounds saved with avail 11 carried the live theme point; conversion =
  // whether the extra point landed. We approximate from score>=base+1 on Music Intro.
  const rs=srcRounds(sk).filter(r=>/music intro/i.test(r.type||"")&&r.avail&&+r.avail>=11&&r.score!=null);
  if(!rs.length) return null;
  const got=rs.filter(r=>+r.score>= ( +r.avail-9 )).length; // heuristic: scored into the theme-point band
  return { n:rs.length, rate:got/rs.length };
}

/* ---- BEST PAIRINGS: which pairs of present players correlate with wins ---- */
function bestPairings(sk){
  const W=srcWeeks(sk).filter(w=>w.placement!=null&&w.attendance);
  const names=state.players.map(p=>p.name);
  const pairs=[];
  for(let i=0;i<names.length;i++)for(let j=i+1;j<names.length;j++){
    const a=names[i], b=names[j];
    const both=W.filter(w=>+w.attendance[a]===1&&+w.attendance[b]===1);
    if(both.length<2) continue;
    const wins=both.filter(w=>+w.placement===1).length;
    pairs.push({a, b, n:both.length, winRate:wins/both.length});
  }
  return pairs.sort((x,y)=> (y.winRate-x.winRate) || (y.n-x.n));
}

/* ---- RIVAL HEAT: closest contested rivals (smallest avg margin) ---- */
function rivalHeat(sk){
  return state.rivals.map(rv=>{
    const rec=rivalRecord(rv.name, sk);
    return { name:rv.name, n:rec.n, winRate:rec.winRate, avgMargin:rec.avgMargin,
             heat: rec.avgMargin!=null? Math.abs(rec.avgMargin) : null };
  }).filter(r=>r.n>0).sort((a,b)=> (a.heat??999)-(b.heat??999));
}
/* head-to-head trend vs a rival: are we pulling ahead or behind across the season? */
function rivalTrend(name, sk){
  const W=weeksOf(sk).filter(w=>w.rivals&&w.rivals[name]&&w.rivals[name].placement!=null&&w.placement!=null)
    .slice().sort((a,b)=>(a.date||"")<(b.date||"")?-1:1);
  const half=Math.floor(W.length/2);
  const rate=arr=>arr.length?arr.filter(w=>+w.placement<+w.rivals[name].placement).length/arr.length:null;
  if(W.length<4) return null;
  return { early:rate(W.slice(0,half)), late:rate(W.slice(half)), n:W.length };
}

function renderInsights(){
  const sk=state.activeSeason;
  const has2025 = !!state.seasons['2025'] && sk!=='2025';
  const combined = yearMode()==="combined";
  const hasData = activeWeeks().length>0;
  if(!hasData){ $("#view-insights").innerHTML = `<p class="eyebrow">${sk} · deeper stats</p><h2 class="section">Insights</h2><div class="empty">No weeks logged yet. Insights appear once you've played a few nights.</div>`; return; }

  const da=doubleAccuracy();
  const jk=jackpotStats();
  const gaps=gapTrend();
  const cons=typeConsistency().sort((a,b)=>(a.sd??9)-(b.sd??9));
  const pairs=bestPairings().slice(0,6);
  const heat=rivalHeat();
  const tp=themePointRate();

  // --- double accuracy block ---
  let daHtml;
  if(da.weeks){
    daHtml = `<div class="stat-grid">`
      + statCard("Double hit rate", da.hitRate!=null?Math.round(da.hitRate*100)+"%":"—", da.hits+" of "+da.weeks+" weeks", true)
      + statCard("Weeks doubled", da.weeks)
      + statCard("Avg pts gained", da.avgGain!=null?(da.avgGain>=0?"+":"")+da.avgGain.toFixed(1):"—", "vs an average round")
      + `</div><p class="hint">"Hit" = the round you doubled scored the best (or joint-best) % of the doublable rounds that night. Points gained estimates how much the double earned versus banking it on a typical round.</p>`;
  } else daHtml = `<p class="hint">No doubled weeks recorded yet.</p>`;

  // --- gap to winners ---
  let gapHtml;
  if(gaps.length){
    const recent=gaps.slice(-6);
    const avgGap=gaps.reduce((a,g)=>a+g.gap,0)/gaps.length;
    const trendArrow = recent.length>=4 ? (()=>{ const h=Math.floor(recent.length/2); const e=recent.slice(0,h).reduce((a,g)=>a+g.gap,0)/h; const l=recent.slice(h).reduce((a,g)=>a+g.gap,0)/(recent.length-h); return l<e?"closing ↓":l>e?"widening ↑":"steady"; })() : "—";
    gapHtml = `<div class="stat-grid">`
      + statCard("Avg gap to winner", avgGap.toFixed(1), "points behind 1st")
      + statCard("Recent trend", trendArrow)
      + statCard("Best night", Math.min(...gaps.map(g=>g.gap)).toFixed(1), "closest to winning")
      + `</div>`;
  } else gapHtml = `<p class="hint">Add winning scores on your weeks to see the gap to the best team.</p>`;

  // --- jackpot ---
  const jkHtml = jk.n
    ? `<div class="stat-grid">`
      + statCard("On the table", jk.onTable!=null?"£"+jk.onTable:"—", jk.curStreak?("unwon "+jk.curStreak+"w"):"fresh", true)
      + statCard("Rollover weeks", jk.rolledWeeks, "of "+jk.n)
      + statCard("Current streak", jk.curStreak, "weeks unwon")
      + `</div>`
    : `<p class="hint">No jackpot data yet.</p>`;

  // --- consistency table ---
  const consHtml = cons.length
    ? `<table><thead><tr><th>Round type</th><th>Avg %</th><th>Swing</th><th>Rounds</th></tr></thead><tbody>`
      + cons.map(c=>`<tr><td style="text-align:left;color:var(--chalk)">${esc(c.name)}</td><td>${c.mean!=null?Math.round(c.mean*100)+"%":"—"}</td><td>${c.sd!=null?"±"+Math.round(c.sd*100)+"%":"—"}</td><td>${c.n}</td></tr>`).join("")
      + `</tbody></table><p class="hint">Lower swing = more reliable. High swing rounds are where nights are won or lost.</p>`
    : `<p class="hint">Not enough rounds yet.</p>`;

  // --- best pairings ---
  const pairHtml = pairs.length
    ? `<table><thead><tr><th>Pairing</th><th>Win % together</th><th>Nights</th></tr></thead><tbody>`
      + pairs.map(p=>`<tr><td style="text-align:left;color:var(--chalk)">${esc(p.a)} + ${esc(p.b)}</td><td>${pct(p.winRate)}</td><td>${p.n}</td></tr>`).join("")
      + `</tbody></table><p class="hint">Which duos are present when you win. Needs a few shared nights to mean anything.</p>`
    : `<p class="hint">Not enough shared attendance yet to spot pairings.</p>`;

  // --- rival heat ---
  const heatHtml = heat.length
    ? `<table><thead><tr><th>Rival</th><th>Win % vs</th><th>Avg margin</th><th>Closeness</th></tr></thead><tbody>`
      + heat.map(r=>{ const tr=rivalTrend(r.name); const trLabel=tr?(tr.late>tr.early?"pulling ahead":tr.late<tr.early?"slipping":"level"):""; 
        return `<tr><td style="text-align:left;color:var(--chalk)">${esc(r.name)}${trLabel?`<span class="hint" style="display:block;margin:0">${trLabel}</span>`:""}</td><td>${r.winRate==null?"—":pct(r.winRate)}</td><td>${r.avgMargin==null?"—":(r.avgMargin>0?"+":"")+r.avgMargin.toFixed(1)}</td><td>${r.heat==null?"—":r.heat.toFixed(1)+" pts"}</td></tr>`; }).join("")
      + `</tbody></table><p class="hint">Sorted by closest contest — the top row is your real nemesis (smallest margin between you).</p>`
    : `<p class="hint">Add rivals and log their weekly placements to see grudges heat up.</p>`;

  $("#view-insights").innerHTML =
    `<p class="eyebrow">${sk} · deeper stats</p>
     <h2 class="section">Insights</h2>
     <p class="section-note">Richer trackers built from your logged weeks${has2025?(combined?", using <b>2025 + "+sk+" combined</b>":", <b>"+sk+" only</b>"):""}. We can strip back to the ones you actually use.</p>
     ${has2025?`<div class="inline-actions" style="margin-bottom:14px">
       <button class="btn sm ${combined?"primary":"ghost"}" data-year="combined">2025 + ${sk}</button>
       <button class="btn sm ${!combined?"primary":"ghost"}" data-year="current">${sk} only</button>
     </div>`:""}
     <div class="panel"><div class="panel-head"><h3>Double Engine accuracy</h3></div><div class="panel-body" style="padding:16px">${daHtml}</div></div>
     <div class="panel"><div class="panel-head"><h3>Gap to the winners</h3></div><div class="panel-body" style="padding:16px">${gapHtml}</div></div>
     <div class="panel"><div class="panel-head"><h3>Jackpot watch</h3><span class="mini-note">${sk} run</span></div><div class="panel-body" style="padding:16px">${jkHtml}</div></div>
     ${tp?`<div class="panel"><div class="panel-head"><h3>Sound theme point</h3></div><div class="panel-body" style="padding:16px"><div class="stat-grid">${statCard("Theme point rate", Math.round(tp.rate*100)+"%", "of "+tp.n+" sound rounds")}</div></div></div>`:""}
     <div class="panel"><div class="panel-head"><h3>Round-type consistency</h3></div><div class="panel-body" style="padding:16px">${consHtml}</div></div>
     <div class="panel"><div class="panel-head"><h3>Best pairings</h3></div><div class="panel-body" style="padding:16px">${pairHtml}</div></div>
     <div class="panel"><div class="panel-head"><h3>Rival heat</h3></div><div class="panel-body" style="padding:16px">${heatHtml}</div></div>`;
  $$("[data-year]").forEach(b=> b.onclick=()=>{ sortState._yearMode=b.dataset.year; render(); });
}

        <div class="legend"><b>W</b> win · <b>P</b> podium · <b>L</b> lower</div></div></div>

      <div class="panel-body" style="padding:16px"><div class="stat-grid">

  `;

/* ================= PLAYERS ================= */
function renderPlayers(){
  const skill=playerSkill();
  const W=weeksOf(); const totalWeeks=W.filter(w=>w.placement!=null).length||W.length;
  const showAll = !!sortState._playersShowAll;
  const seasonHasWeeks = weeksOf().length>0;
  let allRows=state.players.map(p=>{
    const present=W.filter(w=>w.attendance&&+w.attendance[p.name]===1);
    const att=totalWeeks?present.length/totalWeeks:0;
    const pp=present.filter(w=>w.placement!=null);
    const wins=pp.filter(w=>+w.placement===1).length;
    const winRate=pp.length?wins/pp.length:0;
    const ps=present.filter(w=>w.score!=null);
    const avgScore=ps.length?ps.reduce((a,w)=>a+ +w.score,0)/ps.length:0;
    const top=Object.entries(skill[p.name]||{}).map(([t,o])=>({t,e:o.est})).sort((a,b)=>b.e-a.e).slice(0,3);
    return {name:p.name, attendance:att, present:present.length, winRate, avgScore, top, appeared:present.length>0};
  });
  // Hide players who haven't appeared this season yet (their 2025 skill still
  // loads under the hood and they auto-appear on first attendance). Only filter
  // once the season actually has weeks; before that, show everyone.
  const hiddenCount = seasonHasWeeks? allRows.filter(r=>!r.appeared).length : 0;
  const rows = (seasonHasWeeks && !showAll)? allRows.filter(r=>r.appeared) : allRows;
  const key=sortState.players?.key||"winRate", dir=sortState.players?.dir||-1;
  rows.sort((a,b)=>(a[key]>b[key]?1:a[key]<b[key]?-1:0)*dir);
  const head=[["name","Player"],["attendance","Attend."],["winRate","Win % (present)"],["avgScore","Avg Score"]];
  $("#view-players").innerHTML=`
    <p class="eyebrow">Individual contribution &amp; skill</p>
    <h2 class="section">Players</h2>
    <p class="section-note">Skill tags are the engine's view of each person's strengths, seeded from 2025 and updated live as you credit who carries each round in Marking. They drive the presence-adjusted Double Engine.${hiddenCount&&!showAll?` ${hiddenCount} regular${hiddenCount>1?"s":""} from 2025 hidden until they show up this season.`:""}</p>
    <div class="panel"><div class="panel-body"><table>
      <thead><tr>${head.map(([k,l])=>`<th data-sort="players" data-key="${k}">${l}${sortArrow("players",k)}</th>`).join("")}<th>Top subjects</th></tr></thead>
      <tbody>${rows.length?rows.map(r=>`<tr${r.appeared?"":' style="opacity:.55"'}>
        <td>${esc(r.name)}${!r.appeared?' <span class="chip">2025</span>':""}</td><td>${pct(r.attendance)} <span class="pct">${r.present}w</span></td>
        <td>${pct(r.winRate)}</td><td>${num(r.avgScore,1)}</td>
        <td style="text-align:left">${r.top.filter(x=>x.e>0.5).map(x=>`<span class="chip">${esc(x.t)} ${Math.round(x.e*100)}</span>`).join("")||'<span class="hint">learning…</span>'}</td>
      </tr>`).join(""):`<tr><td colspan="5" class="empty">No one's attended a ${state.activeSeason} week yet.</td></tr>`}</tbody>
    </table></div></div>
    <div class="inline-actions" style="margin-top:8px">
      ${hiddenCount||showAll?`<button class="btn sm ghost" id="togglePlayers">${showAll?"Hide 2025-only regulars":`Show all (incl. ${hiddenCount} from 2025)`}</button>`:""}
      ${isAdmin?`<button class="btn sm ghost" id="addPlayerBtn">+ Add player</button>`:""}
    </div>
  `;
  if($("#togglePlayers")) $("#togglePlayers").onclick=()=>{ sortState._playersShowAll=!showAll; renderPlayers(); };
  if(isAdmin&&$("#addPlayerBtn"))$("#addPlayerBtn").onclick=addPlayer;
}

/* ================= RIVALS / GRUDGES ================= */
/* Each week may carry w.rivals = { "Rival Name": {placement, score} }.
   Head-to-head vs us is computed from placements (lower = better). */
function rivalRecord(name, sk){
  const W = weeksOf(sk).filter(w=> w.rivals && w.rivals[name] && w.rivals[name].placement!=null && w.placement!=null);
  let beat=0, lost=0, tied=0, marginSum=0, mN=0;
  W.forEach(w=>{
    const us=+w.placement, them=+w.rivals[name].placement;
    if(us<them) beat++; else if(us>them) lost++; else tied++;
    if(w.score!=null && w.rivals[name].score!=null){ marginSum += (+w.score - +w.rivals[name].score); mN++; }
  });
  const n=beat+lost+tied;
  return { name, n, beat, lost, tied, winRate:n?beat/n:null, avgMargin:mN?marginSum/mN:null };
}

/* ================= RIS BY HOST (used on dashboard) ================= */
function risByHost(sk){
  const W = weeksOf(sk).filter(w=> w.ris!=null && w.quizmaster);
  const by={};
  W.forEach(w=>{ (by[w.quizmaster]=by[w.quizmaster]||[]).push(+w.ris); });
  const all = W.map(w=>+w.ris);
  const mean = all.length? all.reduce((a,x)=>a+x,0)/all.length : null;
  const hosts = Object.entries(by).map(([h,arr])=>({host:h, n:arr.length, avg:arr.reduce((a,x)=>a+x,0)/arr.length}))
                      .sort((a,b)=>b.avg-a.avg);
  return { mean, hosts, n:all.length };
}

/* ================= BINGO ================= */
/* Shared when Supabase sync is configured; otherwise local per-device.
   Each player gets a deterministic random 5×5 card (free centre) seeded from
   their name + the current bingo round, drawn from the admin trope pool. */
let bingoName = (typeof localStorage!=="undefined" && localStorage.getItem("fng_bingo_name")) || "";
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
function hashStr(s){let h=2166136261;for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619);}return h>>>0;}
function bingoCard(name, round){
  const pool = (state.bingo.tropes||[]).filter(Boolean);
  const rng = mulberry32(hashStr(name+"|"+round));
  const idx = pool.map((_,i)=>i);
  // Fisher–Yates with seeded rng
  for(let i=idx.length-1;i>0;i--){ const j=Math.floor(rng()*(i+1)); [idx[i],idx[j]]=[idx[j],idx[i]]; }
  const pick = idx.slice(0,24).map(i=>pool[i]);
  const cells=[]; let p=0;
  for(let i=0;i<25;i++){ if(i===12){ cells.push({free:true,text:"FREE"}); } else { cells.push({free:false,text:pick[p++]||"—"}); } }
  return cells;
}
function bingoLines(marks){ // marks: Set of indices (or array)
  const m = marks instanceof Set ? marks : new Set(marks);
  const L=bingoLineList();
  return L.some(line=> line.every(i=> i===12 || m.has(i)));
}
function bingoLineList(){
  const L=[];
  for(let r=0;r<5;r++) L.push([0,1,2,3,4].map(c=>r*5+c));
  for(let c=0;c<5;c++) L.push([0,1,2,3,4].map(r=>r*5+c));
  L.push([0,6,12,18,24]); L.push([4,8,12,16,20]);
  return L;
}
/* how many more squares the best line needs (0 = bingo). Free centre counts as filled. */
function bingoCloseness(marks){
  const m = marks instanceof Set ? marks : new Set(marks);
  let best=5;
  for(const line of bingoLineList()){
    const need=line.filter(i=> i!==12 && !m.has(i)).length;
    if(need<best) best=need;
  }
  return best;
}
/* per-player marks live in state.bingo.players so they sync across phones */
function bingoPlayers(){ if(!state.bingo.players) state.bingo.players={}; return state.bingo.players; }
function bingoEntry(name){
  const ps=bingoPlayers(), round=state.bingo.round||1;
  let e=ps[name];
  if(!e || e.round!==round){ e={marks:[12], round, ts:Date.now()}; ps[name]=e; }  // reset on new round
  if(!e.marks.includes(12)) e.marks.push(12);
  return e;
}
function myMarks(){ return bingoName ? new Set(bingoEntry(bingoName).marks) : new Set([12]); }

function renderBingo(){
  const synced = SYNC_ON;
  const round = state.bingo.round||1;
  const haveName = !!bingoName;
  const pool=(state.bingo.tropes||[]).filter(Boolean);
  const enough = pool.length>=24;
  const cells = haveName? bingoCard(bingoName, round) : [];
  const marks = myMarks();

  // roster of everyone playing this round (sorted: bingo-ers first, then closest to a line)
  const ps=bingoPlayers();
  const roster=Object.keys(ps).filter(n=>ps[n].round===round).map(n=>{
    const mk=new Set(ps[n].marks); const won=bingoLines(mk);
    return { name:n, need:bingoCloseness(mk), won };
  }).sort((a,b)=> (b.won-a.won) || (a.need-b.need));

  const myNeed = bingoCloseness(marks);
  const closenessLabel = need => need===0 ? "line complete" : need===1 ? "needs 1 for a line" : "needs "+need+" for a line";

  $("#view-bingo").innerHTML = `
    <p class="eyebrow">Host tropes · live</p>
    <h2 class="section">Quiz Bingo</h2>
    <p class="section-note">Everyone opens this on their own phone, types their name, and gets a different random card. Tap a square when it happens. Line of 5 (free centre counts) = bingo. ${synced?"Progress is <b>shared</b> — everyone sees the board below update live.":"<b>Local mode</b> — sync isn't set up, so the board only shows players on this device. Set up sharing in Admin to play across phones."} Round <b>#${round}</b>.</p>
    ${!enough?`<div class="empty">Need at least 24 trope squares to make a card — there are ${pool.length}. ${isAdmin?"Add more under Manage tropes below.":"Ask the admin to add more."}</div>`:""}
    <div class="panel"><div class="panel-body" style="padding:16px">
      <div class="field-row" style="align-items:flex-end">
        <div class="field"><label>Your name (for your card)</label><input id="bingo_name" value="${esc(bingoName)}" placeholder="e.g. Kay"></div>

function startNewSeason(){
  const yr=prompt("New season name (e.g. 2027):", String(+state.activeSeason+1));
  if(!yr) return;
  if(state.seasons[yr]){ toast("Season exists"); return; }
  // lock current, carry skills forward (priors stay on players), start empty
  season().locked=true;
  state.seasons[yr]={weeks:[],rounds:[],locked:false};
  state.activeSeason=yr; save(); render(); switchTab("dashboard"); toast(yr+" started");
}

function exportJson(){const blob=new Blob([JSON.stringify(state,null,2)],{type:"application/json"});dl(blob,"freaks-and-geeks-data.json");toast("JSON exported");}
function importJson(){const inp=document.createElement("input");inp.type="file";inp.accept=".json";
  inp.onchange=()=>{const f=inp.files[0];if(!f)return;const rd=new FileReader();
    rd.onload=()=>{try{const d=JSON.parse(rd.result);if(d.version){state=d;save();render();toast("Imported");}else toast("Not a valid backup");}catch(e){toast("Bad file");}};rd.readAsText(f);};
  inp.click();}
function dl(blob,name){const u=URL.createObjectURL(blob);const a=document.createElement("a");a.href=u;a.download=name;a.click();URL.revokeObjectURL(u);}

/* xlsx export via SheetJS (loaded on demand) */
function exportXlsx(){
  toast("Building spreadsheet…");
  loadScript("https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js",()=>{
    const XLSX=window.XLSX;const wb=XLSX.utils.book_new();
    const sk=state.activeSeason;
    // Weekly Log
    const wl=[["Date","Start","Quizmaster","Placement","No. Teams","Score","Win Score","S2W","Jackpot","Jackpot Won","Winning Team","RIS","Team Size",...playerNames()]];
    weeksOf().forEach(w=>{const s2w=(w.score!=null&&w.winScore)?w.score/w.winScore:"";
      wl.push([w.date||"",w.startTime||"",w.quizmaster||"",w.placement??"",w.numTeams??"",w.score??"",w.winScore??"",s2w,w.jackpot??"",w.jackpotWon?"Yes":"",w.winnerTeam||"",w.ris??"",w.teamSize??"",
        ...playerNames().map(n=>(w.attendance&&+w.attendance[n]===1)?1:"")]);});
    XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(wl),"Weekly Log");
    // Round Data
    const rd=[["Date","Round","Type","Theme","Tags","Score","Avail","Double","MVPs"]];
    roundsOf().forEach(r=>rd.push([r.date||"",r.roundNum??"",r.type||"",r.theme||"",r.tags||"",r.score??"",r.avail??"",r.double?1:"",r.mvps||""]));
    XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(rd),"Round Data");
    // Dashboard (computed snapshot)
    const t=teamStats();const db=[["TEAM STATS"],["Weeks",t.weeks],["Wins",t.wins],["Win Rate",t.winRate],["Podium %",t.podiumPct],
      ["Avg Place",t.avgPlace],["Avg Score",t.avgScore],["High Score",t.highScore],["Avg S2W",t.avgS2W],[],["STRENGTH BY TAG","%","Rounds"]];
    strengthByTag().forEach(s=>db.push([s.name,s.pct,s.n]));
    XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(db),"Dashboard");
    // Players + skill
    const skill=playerSkill();const pl=[["Player",...state.tags]];
    state.players.forEach(p=>pl.push([p.name,...state.tags.map(t=>skill[p.name][t].est)]));
    XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(pl),"Player Skill");
    // KeywordTable
    const kw=[["Keyword","Tag1","Tag2","Tag3","Tag4"]];
    state.keywords.forEach(k=>kw.push([k.k,...(k.t||[]).slice(0,4)]));
    XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(kw),"KeywordTable");
    XLSX.writeFile(wb,`freaks-and-geeks-${sk}.xlsx`);
    toast("Spreadsheet downloaded");
  });
}
function loadScript(src,cb){if(window.XLSX){cb();return;}const s=document.createElement("script");s.src=src;s.onload=cb;s.onerror=()=>toast("Couldn't load export library (offline?)");document.head.appendChild(s);}
